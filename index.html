<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Una pregunta importante ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    padding:20px;
}

/* El cuadrado blanco ahora es la "jaula" del botón */
#cajaPrincipal {
    position: relative; 
    z-index: 10;
}

.contenedor{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    max-width:600px;
    width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    animation: aparecer 0.8s ease-out forwards;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
    font-size:2.2rem;
    font-weight: 600;
}

p{
    color:#555;
    font-size:1.2rem;
    line-height:1.6;
}

.botones{
    display:flex;
    justify-content:center;
    align-items: center;
    gap:25px;
    margin-top:35px;
    min-height: 80px;
}

button{
    border:none;
    border-radius:50px;
    padding:15px 35px;
    font-size:1.2rem;
    font-weight: 600;
    cursor:pointer;
    color:white;
    transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button:hover {
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

#si{
    background:#ff4d6d;
    animation: latido 1.5s infinite;
}

#si:hover {
    background: #ff3355;
}

@keyframes latido {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

#no{
    background:#6c757d;
    position: relative;
    z-index: 1000;
}

.corazon{
    position:fixed;
    bottom:-50px;
    animation:subir linear forwards;
    pointer-events:none;
    z-index: 998;
}

@keyframes subir{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

#pantallaFinal{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
    z-index:999;
    animation: aparecer 0.5s ease-out forwards;
}

#pantallaFinal h1 {
    font-size: 2.8rem;
}
</style>
</head>
<body>

<div class="contenedor" id="cajaPrincipal">
    <h1>❤️ ¿Querés ir al cine conmigo a ver Obsesión? 🍿</h1>

    <p>
        🥺 Tengo una invitación para vos.<br><br>
        ❤️ Te espero en mi casa a las 6:00 PM ❤️<br>
        🍿 Y después vamos juntos al cine 🍿
    </p>

    <div class="botones">
        <button id="si">Sí ❤️</button>
        <button id="no">No 😜</button>
    </div>
</div>

<div id="pantallaFinal">
    <div class="contenedor">
        <h1>🥰 ¡PLAN CONFIRMADO!</h1>
        <p>❤️ Te espero en mi casa a las 6:00 PM ❤️</p>
        <p>🍿 Después vamos a ver Obsesión juntos 🍿</p>
        <p>✨ Sabía que ibas a decir que sí ✨</p>
    </div>
</div>

<script>
const botonNo = document.getElementById("no");
const botonSi = document.getElementById("si");
const cajaPrincipal = document.getElementById("cajaPrincipal");

let intentos = 0;
let escala = 1;

function escapar(e){
    if(e) e.preventDefault();

    intentos++;

    // Tomamos las medidas del cuadrado blanco y del botón
    const anchoCaja = cajaPrincipal.offsetWidth;
    const altoCaja = cajaPrincipal.offsetHeight;
    const anchoBtn = botonNo.offsetWidth;
    const altoBtn = botonNo.offsetHeight;

    // Calculamos un punto al azar DENTRO del cuadrado blanco
    // Restamos el tamaño del botón y dejamos 15px de margen para que no muerda el borde
    const maxX = anchoCaja - anchoBtn - 15;
    const maxY = altoCaja - altoBtn - 15;

    const nuevoX = 15 + Math.random() * (maxX - 15);
    const nuevoY = 15 + Math.random() * (maxY - 15);

    // Lo pasamos a absolute para que se mueva en relación al cuadrado, no a la pantalla
    botonNo.style.position = "absolute";
    botonNo.style.left = nuevoX + "px";
    botonNo.style.top = nuevoY + "px";
    botonNo.style.transition = "all 0.2s ease";

    botonSi.style.animation = "none";
    escala += 0.15;
    botonSi.style.transform = `scale(${escala})`;

    if(intentos >= 5){
        botonNo.innerHTML = "😅";
    }

    if(intentos >= 10){
        botonNo.style.display = "none";
    }
}

botonNo.addEventListener("mouseover", escapar);
botonNo.addEventListener("touchstart", escapar);
botonNo.addEventListener("click", escapar);

botonSi.addEventListener("click", () => {
    document.getElementById("pantallaFinal").style.display = "flex";

    for(let i = 0; i < 150; i++){
        setTimeout(crearCorazon, i * 30);
    }
});

function crearCorazon(){
    const corazon = document.createElement("div");

    corazon.className = "corazon";
    corazon.innerHTML = "❤️";

    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 30 + 20) + "px";
    corazon.style.animationDuration = (Math.random() * 2 + 3) + "s";

    document.body.appendChild(corazon);

    setTimeout(() => {
        corazon.remove();
    }, 6000);
}

setInterval(crearCorazon, 800);
</script>

</body>
</html>
