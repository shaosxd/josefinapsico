<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Una pregunta importante ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    overflow:hidden;
    padding:20px;
}

.contenedor{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    max-width:600px;
    width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
    z-index:10;
    /* Animación de entrada */
    animation: aparecer 0.8s ease-out forwards;
}

@keyframes aparecer {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
    font-size:2.2rem;
    font-weight: 600;
}

p{
    color:#555;
    font-size:1.2rem;
    line-height:1.6;
}

.botones{
    display:flex;
    justify-content:center;
    align-items: center;
    gap:25px;
    margin-top:35px;
    min-height: 80px; /* Evita que el contenedor salte cuando el botón crece */
}

button{
    border:none;
    border-radius:50px; /* Bordes más redondeados */
    padding:15px 35px;
    font-size:1.2rem;
    font-weight: 600;
    cursor:pointer;
    color:white;
    transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

button:hover {
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

#si{
    background:#ff4d6d; /* Cambiado a un rosa fuerte para que combine mejor */
    animation: latido 1.5s infinite; /* Llamador visual */
}

#si:hover {
    background: #ff3355;
}

@keyframes latido {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
}

#no{
    background:#6c757d; /* Color más neutro para el "No" */
    position: relative; /* Preparado para cuando se vuelva fixed */
}

.corazon{
    position:fixed;
    bottom:-50px;
    animation:subir linear forwards;
    pointer-events:none;
    z-index: 998;
}

@keyframes subir{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

#pantallaFinal{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    padding:20px;
    z-index:999;
    animation: aparecer 0.5s ease-out forwards;
}

#pantallaFinal h1{
    color:white;
    font-size:3.5rem;
    margin-bottom:20px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
}

#pantallaFinal p{
    color:white;
    font-size:1.5rem;
    margin:8px 0;
    font-weight: 600;
}
</style>
</head>
<body>

<div class="contenedor">
    <h1>❤️ ¿Querés ir al cine conmigo a ver Obsesión? 🍿</h1>

    <p>
        🥺 Tengo una invitación para vos.<br><br>
        ❤️ Te espero en mi casa a las 6:00 PM ❤️<br>
        🍿 Y después vamos juntos al cine 🍿
    </p>

    <div class="botones">
        <button id="si">Sí ❤️</button>
        <button id="no">No 😜</button>
    </div>
</div>

<div id="pantallaFinal">
    <h1>🥰 ¡PLAN CONFIRMADO!</h1>
    <p>❤️ Te espero en mi casa a las 6:00 PM ❤️</p>
    <p>🍿 Después vamos a ver Obsesión juntos 🍿</p>
    <p>✨ Sabía que ibas a decir que sí ✨</p>
</div>

<script>
const botonNo = document.getElementById("no");
const botonSi = document.getElementById("si");
// const musica = document.getElementById("musicaFondo"); // Descomentar si usás música

let intentos = 0;
let escala = 1;

function escapar(e){
    if(e) e.preventDefault();

    intentos++;

    // Calculamos los bordes seguros para que el botón no se vaya fuera de la pantalla
    const paddingSeguro = 20;
    const ancho = window.innerWidth - botonNo.offsetWidth - paddingSeguro;
    const alto = window.innerHeight - botonNo.offsetHeight - paddingSeguro;

    const x = Math.max(paddingSeguro, Math.random() * ancho);
    const y = Math.max(paddingSeguro, Math.random() * alto);

    // Cambiamos a fixed recién en el primer escape para que el layout inicial no se rompa
    botonNo.style.position = "fixed";
    botonNo.style.left = x + "px";
    botonNo.style.top = y + "px";
    botonNo.style.transition = "all 0.1s ease"; // Hace que el movimiento sea un poco más suave

    // El botón "Sí" crece pero sin la animación de latido para que no se superpongan transformaciones
    botonSi.style.animation = "none";
    escala += 0.15;
    botonSi.style.transform = `scale(${escala})`;

    if(intentos >= 5){
        botonNo.innerHTML = "😅";
    }

    if(intentos >= 10){
        botonNo.style.display = "none";
    }
}

botonNo.addEventListener("mouseover", escapar);
botonNo.addEventListener("touchstart", escapar);
botonNo.addEventListener("click", escapar);

botonSi.addEventListener("click", () => {
    document.getElementById("pantallaFinal").style.display = "flex";
    
    // Si descomentás el audio arriba, descomentá esto para que suene al decir que sí
    // musica.play().catch(error => console.log("El navegador bloqueó el autoplay"));

    for(let i = 0; i < 150; i++){
        setTimeout(crearCorazon, i * 30); // Lluvia de corazones más fluida
    }
});

function crearCorazon(){
    const corazon = document.createElement("div");

    corazon.className = "corazon";
    corazon.innerHTML = "❤️";

    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.fontSize = (Math.random() * 30 + 20) + "px";
    corazon.style.animationDuration = (Math.random() * 2 + 3) + "s";

    document.body.appendChild(corazon);

    setTimeout(() => {
        corazon.remove();
    }, 6000);
}

// Corazones de fondo constantes
setInterval(crearCorazon, 800);
</script>

</body>
</html>
